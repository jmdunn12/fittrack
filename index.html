<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Warrior Fit Tracker</title>
<meta name="description" content="Personal nutrition, training, and bodyweight tracker">
<meta name="theme-color" content="#0C0E14">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Warrior Fit Tracker">
<style>
  :root{
    --bg:#0C0E14;
    --card:#13151E;
    --border:#222536;
    --accent:#00C896;
    --accent-dim:#00C89633;
    --protein:#FF6B6B;
    --carbs:#4D9FFF;
    --fat:#FFD166;
    --text:#F2F3F7;
    --text-dim:#8A8F9E;
    --text-faint:#5B6070;
    --danger:#FF6B6B;
    --radius:14px;
    --safe-t:env(safe-area-inset-top);
    --safe-b:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left);
    --safe-r:env(safe-area-inset-right);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none;
    min-height:100dvh;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100dvh;
    position:relative;
    padding-left:var(--safe-l);
    padding-right:var(--safe-r);
  }
  main{
    padding:calc(1rem + var(--safe-t)) 1rem calc(6.5rem + var(--safe-b));
    min-height:100dvh;
  }
  h1,h2,h3,p{margin:0;}
  .page-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:.25rem;}
  .page-sub{color:var(--text-dim);font-size:.85rem;margin-bottom:1.1rem;}

  /* ---- Tab bar ---- */
  .tabbar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:0;
    width:100%;
    max-width:480px;
    display:flex;
    background:rgba(19,21,30,0.92);
    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    padding:.4rem max(.5rem, var(--safe-l)) calc(.4rem + var(--safe-b)) max(.5rem, var(--safe-r));
    z-index:50;
  }
  .tabbtn{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.2rem;
    background:none;
    border:none;
    color:var(--text-faint);
    font-family:inherit;
    font-size:.64rem;
    font-weight:600;
    padding:.4rem 0 .3rem;
    border-radius:10px;
    min-width:0;
  }
  .tabbtn svg{width:21px;height:21px;}
  .tabbtn.active{color:var(--accent);}
  .tabbtn:active{background:rgba(255,255,255,0.04);}

  /* ---- Cards ---- */
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1rem;
    margin-bottom:.75rem;
  }
  .card-title{font-weight:700;font-size:1rem;}
  .card-sub{color:var(--text-dim);font-size:.78rem;margin-top:.1rem;}

  /* ---- Totals bar (Today) ---- */
  .totals-card{padding:1rem 1rem 1.1rem;}
  .totals-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.7rem;}
  .totals-kcal{font-size:1.6rem;font-weight:800;letter-spacing:-0.02em;}
  .totals-kcal span{font-size:.85rem;font-weight:600;color:var(--text-dim);}
  .macro-row{display:flex;flex-direction:column;gap:.55rem;}
  .macro-line{display:flex;align-items:center;gap:.6rem;}
  .macro-label{width:2.6rem;font-size:.72rem;font-weight:700;color:var(--text-dim);flex-shrink:0;}
  .macro-track{flex:1;height:7px;border-radius:6px;background:#1D2030;overflow:hidden;}
  .macro-fill{height:100%;border-radius:6px;transition:width .35s ease;}
  .macro-val{width:5.4rem;text-align:right;font-size:.72rem;color:var(--text-dim);flex-shrink:0;font-variant-numeric:tabular-nums;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

  /* ---- Meal check list (Today) ---- */
  .meal-item{
    display:flex;
    align-items:center;
    gap:.75rem;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:.85rem .9rem;
    margin-bottom:.6rem;
    transition:border-color .2s, background .2s;
  }
  .meal-item.checked{border-color:var(--accent);background:linear-gradient(0deg, var(--accent-dim), var(--accent-dim)), var(--card);}
  .check-circle{
    width:24px;height:24px;border-radius:50%;
    border:2px solid var(--text-faint);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .2s, background .2s;
  }
  .meal-item.checked .check-circle{border-color:var(--accent);background:var(--accent);}
  .check-circle svg{width:14px;height:14px;opacity:0;transition:opacity .15s;}
  .meal-item.checked .check-circle svg{opacity:1;}
  .meal-info{flex:1;min-width:0;}
  .meal-name{font-weight:700;font-size:.92rem;}
  .meal-name-sub{color:var(--text-dim);font-size:.72rem;margin-top:.1rem;}
  .meal-macros{display:flex;gap:.4rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
  .macro-chip{font-size:.65rem;font-weight:700;padding:.15rem .4rem;border-radius:6px;}
  .macro-chip.p{color:var(--protein);background:#FF6B6B22;}
  .macro-chip.c{color:var(--carbs);background:#4D9FFF22;}
  .macro-chip.f{color:var(--fat);background:#FFD16622;}

  /* ---- Toggle buttons ---- */
  .toggle-row{display:flex;gap:.6rem;margin-bottom:.6rem;}
  .toggle-btn{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:inherit;
    font-weight:700;
    font-size:.85rem;
    padding:.8rem 0;
    border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;gap:.45rem;
  }
  .toggle-btn svg{width:18px;height:18px;}
  .toggle-btn.on{background:var(--accent);border-color:var(--accent);color:#062019;}
  .toggle-btn.disabled{opacity:.4;}
  .restday-btn{
    width:100%;background:none;border:1px solid var(--border);color:var(--text-dim);
    font-family:inherit;font-weight:700;font-size:.78rem;padding:.55rem;border-radius:var(--radius);
    margin-bottom:.75rem;
  }
  .restday-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

  /* ---- Plan adherence card ---- */
  .plan-card{margin-top:.15rem;}
  .plan-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem;}
  .plan-label{font-weight:700;font-size:.95rem;}
  .plan-pct{font-weight:800;font-size:1.5rem;letter-spacing:-0.02em;}
  .plan-track{height:9px;border-radius:6px;background:#1D2030;overflow:hidden;margin-bottom:.7rem;}
  .plan-fill{display:block;height:100%;border-radius:6px;transition:width .35s ease;}
  .plan-breakdown{display:flex;gap:.4rem;flex-wrap:wrap;}
  .plan-chip{font-size:.7rem;font-weight:700;padding:.25rem .5rem;border-radius:7px;background:#1D2030;color:var(--text-dim);}
  .plan-chip.done{color:var(--accent);background:var(--accent-dim);}
  .plan-chip.rest{color:var(--carbs);background:#4D9FFF22;}
  .plan-card.adh-high .plan-pct{color:var(--accent);}
  .plan-card.adh-high .plan-fill{background:var(--accent);}
  .plan-card.adh-mid .plan-pct{color:var(--fat);}
  .plan-card.adh-mid .plan-fill{background:var(--fat);}
  .plan-card.adh-low .plan-pct{color:var(--protein);}
  .plan-card.adh-low .plan-fill{background:var(--protein);}

  /* ---- Adherence history (Log) ---- */
  .adh-high{background:var(--accent);}
  .adh-mid{background:var(--fat);}
  .adh-low{background:var(--protein);}
  .adh-high-text{color:var(--accent);}
  .adh-mid-text{color:var(--fat);}
  .adh-low-text{color:var(--protein);}
  .adh-list{display:flex;flex-direction:column;gap:.65rem;}
  .adh-row{
    display:grid;
    grid-template-columns:3.4rem 1fr 2.6rem;
    grid-template-areas:"date bar pct" "detail detail detail";
    align-items:center;gap:.3rem .6rem;
  }
  .adh-date{grid-area:date;font-size:.76rem;color:var(--text);font-weight:600;}
  .adh-today{color:var(--accent);font-weight:700;font-size:.6rem;display:block;}
  .adh-bar-wrap{grid-area:bar;height:8px;border-radius:5px;background:#1D2030;overflow:hidden;}
  .adh-bar{display:block;height:100%;border-radius:5px;}
  .adh-pct{grid-area:pct;text-align:right;font-weight:800;font-size:.85rem;font-variant-numeric:tabular-nums;}
  .adh-detail{grid-area:detail;font-size:.68rem;color:var(--text-faint);}

  /* ---- Backup & Restore ---- */
  .backup-btns{display:flex;gap:.5rem;flex-wrap:wrap;}
  .backup-btn{
    flex:1;min-width:8rem;background:var(--card);border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-weight:700;font-size:.82rem;padding:.7rem;border-radius:10px;
  }
  .backup-btn.primary{background:var(--accent);border-color:var(--accent);color:#062019;}
  .backup-btn:active{opacity:.8;}
  .backup-flash{color:var(--accent);font-size:.75rem;font-weight:600;line-height:1.4;margin-top:.6rem;min-height:1rem;}
  .backup-divider{height:1px;background:var(--border);margin:1rem 0;}
  .backup-file-label{
    display:block;background:#0D0F17;border:1px dashed var(--border);color:var(--text-dim);
    font-weight:700;font-size:.82rem;padding:.7rem;border-radius:10px;text-align:center;margin-bottom:.7rem;
  }
  .backup-file-label input{display:none;}
  .backup-or{color:var(--text-faint);font-size:.72rem;text-align:center;margin-bottom:.6rem;}
  .backup-textarea{
    width:100%;height:4.5rem;background:#0D0F17;border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-size:.78rem;padding:.6rem;border-radius:10px;resize:vertical;margin-bottom:.7rem;
  }
  .backup-textarea:focus{outline:none;border-color:var(--accent);}

  /* ---- Weight input ---- */
  .weight-row{display:flex;gap:.6rem;align-items:stretch;}
  .weight-input{
    flex:1;
    background:#0D0F17;
    border:1px solid var(--border);
    color:var(--text);
    font-family:inherit;
    font-size:1rem;
    font-weight:600;
    padding:.8rem .9rem;
    border-radius:var(--radius);
    min-width:0;
  }
  .weight-input:focus{outline:none;border-color:var(--accent);}
  .save-btn{
    background:var(--accent);
    color:#062019;
    border:none;
    font-family:inherit;
    font-weight:800;
    font-size:.9rem;
    padding:.8rem 1.2rem;
    border-radius:var(--radius);
    white-space:nowrap;
  }
  .save-btn:active{opacity:.8;}
  .save-flash{color:var(--accent);font-size:.78rem;font-weight:700;margin-top:.5rem;height:1rem;}

  /* ---- Diet tab ---- */
  .target-strip{display:flex;gap:.5rem;margin-bottom:1rem;}
  .target-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.6rem .3rem;text-align:center;}
  .target-pill .n{font-size:1rem;font-weight:800;}
  .target-pill .l{font-size:.62rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:.1rem;}
  .diet-meal .card-title{display:flex;justify-content:space-between;align-items:baseline;}
  .diet-meal .kcal-tag{font-size:.72rem;color:var(--text-dim);font-weight:700;}
  .ingredient-list{list-style:none;padding:0;margin:.6rem 0 .7rem;}
  .ingredient-list li{
    font-size:.85rem;color:var(--text);
    padding:.3rem 0;
    border-bottom:1px solid var(--border);
  }
  .ingredient-list li:last-child{border-bottom:none;}
  .diet-macros{display:flex;gap:.5rem;}
  .diet-macros .macro-chip{font-size:.68rem;padding:.25rem .5rem;}

  /* ---- Training tab ---- */
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.6rem;overflow:hidden;}
  .day-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:.9rem 1rem;
  }
  .day-head-l{display:flex;align-items:center;gap:.7rem;}
  .day-num{
    width:30px;height:30px;border-radius:9px;
    background:#1D2030;color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:.8rem;flex-shrink:0;
  }
  .day-card.rest .day-num{color:var(--text-faint);}
  .day-title{font-weight:700;font-size:.92rem;}
  .day-focus{color:var(--text-dim);font-size:.72rem;margin-top:.1rem;}
  .chev{width:18px;height:18px;color:var(--text-faint);transition:transform .2s;flex-shrink:0;}
  .day-card.open .chev{transform:rotate(180deg);}
  .day-body{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .day-card.open .day-body{max-height:2400px;}
  .day-body-inner{padding:0 1rem 1rem;}
  .ex-list{list-style:none;margin:0;padding:0;}
  .ex-list li{
    font-size:.83rem;padding:.45rem 0;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;gap:.6rem;
  }
  .ex-list li:last-child{border-bottom:none;}
  .ex-list .ex-name{color:var(--text);}
  .ex-list .ex-scheme{color:var(--text-dim);font-size:.76rem;white-space:nowrap;flex-shrink:0;}
  .notes-card ul{margin:.5rem 0 0;padding-left:1.1rem;}
  .notes-card li{font-size:.85rem;margin-bottom:.45rem;color:var(--text);}
  .notes-card li:last-child{margin-bottom:0;}

  /* ---- Log tab ---- */
  .stat-row{display:flex;gap:.6rem;margin-bottom:.9rem;}
  .stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;}
  .stat-card .v{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;}
  .stat-card .v small{font-size:.7rem;color:var(--text-dim);font-weight:600;}
  .stat-card .l{font-size:.68rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}
  .chart-card{padding:1rem 1rem .5rem;}
  .chart-wrap{width:100%;}
  .chart-wrap svg{width:100%;height:auto;display:block;}
  table.log-table{width:100%;border-collapse:collapse;font-size:.83rem;}
  table.log-table th{
    text-align:left;color:var(--text-dim);font-size:.68rem;text-transform:uppercase;
    letter-spacing:.04em;font-weight:700;padding-bottom:.5rem;border-bottom:1px solid var(--border);
  }
  table.log-table td{padding:.55rem 0;border-bottom:1px solid var(--border);}
  table.log-table tr:last-child td{border-bottom:none;}
  table.log-table td.wt{font-weight:700;font-variant-numeric:tabular-nums;}
  table.log-table tr.today-row td{color:var(--accent);font-weight:700;}
  table.log-table td.delta{font-size:.76rem;color:var(--text-dim);}
  .delta.up{color:var(--fat);}
  .delta.down{color:var(--accent);}
  .empty-hint{color:var(--text-dim);font-size:.85rem;text-align:center;padding:1.5rem 0;}
  .section-title{font-size:1.05rem;font-weight:800;letter-spacing:-0.01em;margin:1.3rem 0 .7rem;}
  .lift-card{padding:.85rem 1rem;}
  .lift-head{display:flex;align-items:center;gap:.7rem;}
  .lift-name-wrap{flex:1;min-width:0;}
  .lift-name{font-weight:700;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lift-sub{color:var(--text-dim);font-size:.7rem;margin-top:.2rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .lift-sub-meta{color:var(--text-dim);}
  .trend-badge{font-size:.64rem;font-weight:800;padding:.1rem .4rem;border-radius:5px;letter-spacing:.02em;white-space:nowrap;}
  .trend-badge.trend-up{color:var(--accent);background:#00C89622;}
  .trend-badge.trend-down{color:var(--fat);background:#FFD16622;}
  .trend-badge.trend-flat{color:var(--text-dim);background:#2A2E42;}

  .analysis-card{padding:1rem;}
  .analysis-verdict{font-size:1.35rem;font-weight:800;letter-spacing:-0.02em;margin-top:.5rem;}
  .analysis-verdict.trend-up{color:var(--accent);}
  .analysis-verdict.trend-down{color:var(--fat);}
  .analysis-verdict.trend-flat{color:var(--text);}
  .analysis-verdict-sub{color:var(--text-dim);font-size:.76rem;margin:.15rem 0 .5rem;}
  .analysis-row{display:flex;justify-content:space-between;gap:.7rem;align-items:baseline;padding:.5rem 0;border-top:1px solid var(--border);font-size:.83rem;}
  .analysis-label{color:var(--text-dim);}
  .analysis-val{font-weight:700;text-align:right;font-variant-numeric:tabular-nums;}
  .analysis-val.trend-up{color:var(--accent);}
  .analysis-val.trend-down{color:var(--fat);}

  /* ---- Progress tab ---- */
  .block-selector{display:flex;gap:.5rem;margin-bottom:1rem;}
  .block-chip{
    flex:1;background:var(--card);border:1px solid var(--border);color:var(--text-dim);
    font-family:inherit;font-weight:700;font-size:.8rem;padding:.6rem 0;border-radius:10px;
  }
  .block-chip.active{background:var(--accent);border-color:var(--accent);color:#062019;}
  .block-lift{padding:.9rem 1rem;}
  .block-lift-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem;}
  .block-lift-name{font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .block-lift-body{display:flex;align-items:center;gap:.5rem;}
  .block-endpoint{flex-shrink:0;text-align:center;min-width:3.6rem;}
  .block-ep-w{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
  .block-ep-w small{font-size:.6rem;color:var(--text-dim);font-weight:600;}
  .block-ep-l{font-size:.64rem;color:var(--text-faint);margin-top:.15rem;}
  .block-arrow{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:.15rem;}
  .block-delta{font-size:.78rem;font-weight:800;}
  .block-pct{font-size:.66rem;font-weight:700;}
  .block-delta.trend-up,.block-pct.trend-up{color:var(--accent);}
  .block-delta.trend-down,.block-pct.trend-down{color:var(--fat);}
  .block-arrow-line{width:100%;display:flex;justify-content:center;}
  .block-arrow-line svg{width:100%;max-width:110px;height:26px;}
  .block-single{color:var(--text-faint);font-size:.72rem;}
  .lift-spark{flex-shrink:0;display:flex;align-items:center;}
  .lift-latest{flex-shrink:0;font-weight:800;font-size:1.05rem;font-variant-numeric:tabular-nums;min-width:3.2rem;text-align:right;}
  .lift-latest small{font-size:.65rem;color:var(--text-dim);font-weight:600;}
  .lift-change.gain{color:var(--accent);}
  .lift-change.loss{color:var(--fat);}
  .lift-hist{margin-top:.7rem;border-top:1px solid var(--border);padding-top:.4rem;}
  .lift-hist-row{display:flex;gap:.6rem;font-size:.78rem;padding:.35rem 0;border-bottom:1px solid var(--border);align-items:baseline;}
  .lift-hist-row:last-child{border-bottom:none;}
  .lift-hist-date{color:var(--text-faint);width:3.6rem;flex-shrink:0;}
  .lift-hist-w{flex:1;color:var(--text);font-variant-numeric:tabular-nums;}
  .lift-hist-delta{flex-shrink:0;font-size:.72rem;font-weight:700;}

  /* ---- Edit mode controls ---- */
  .page-head-row{display:flex;justify-content:space-between;align-items:center;gap:.75rem;margin-bottom:.25rem;}
  .page-head-row .page-title{margin-bottom:0;}
  .edit-toggle-btn{
    background:var(--card);border:1px solid var(--border);color:var(--accent);
    font-family:inherit;font-weight:700;font-size:.78rem;padding:.45rem .9rem;border-radius:10px;
    display:flex;align-items:center;gap:.35rem;flex-shrink:0;
  }
  .edit-toggle-btn svg{width:14px;height:14px;}
  .edit-toggle-btn.active{background:var(--accent);color:#062019;border-color:var(--accent);}

  .field-input{
    width:100%;background:#0D0F17;border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-size:.85rem;padding:.55rem .65rem;border-radius:10px;min-width:0;
  }
  .field-input:focus{outline:none;border-color:var(--accent);}
  .field-row{display:flex;gap:.5rem;margin-bottom:.6rem;}
  .field-row .field-input{flex:1;min-width:0;}

  .macro-edit-row{display:flex;gap:.5rem;}
  .macro-edit{flex:1;}
  .macro-edit label{display:block;font-size:.62rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.25rem;}
  .macro-edit input{
    width:100%;background:#0D0F17;border:1px solid var(--border);color:var(--text);

(function(){
  "use strict";

  /* ===================== DATA ===================== */

  function ing(food, qty, unit){

  }
  function ingManual(text, p, c, f){

  }

  var DEFAULT_MEALS = [
    { id:1, name:"Meal 1", sub:"Breakfast", items:[
      ing("Egg whites", 180, "g"),
      ing("Whole eggs", 90, "g"),
      ing("Dry oats", 40, "g"),

  function ingredientContribution(item){
    if(item.mode === "manual"){
      return item.manual ? {p:item.manual.p, c:item.manual.c, f:item.manual.f} : {p:0,c:0,f:0};
    }
    if(!item.per100) return {p:0, c:0, f:0};
    var ratio = item.qty/100;
    return {p:item.per100.p*ratio, c:item.per100.c*ratio, f:item.per100.f*ratio};
  }

  function mealTotals(m){
    // Sum whole-gram ingredient contributions (the same rounded values the
    // UI shows per ingredient) so ingredients always add up exactly to the
    // meal chips, and meals add up exactly to the daily strip.
    var t = {p:0, c:0, f:0};
    m.items.forEach(function(item){
      var c = ingredientContribution(item);
      t.p += Math.round(c.p); t.c += Math.round(c.c); t.f += Math.round(c.f);
    });
    t.kcal = t.p*4 + t.c*4 + t.f*9;
    return t;
  }

  function getDailyTotals(){
    var t = {kcal:0, p:0, c:0, f:0};
    state.meals.forEach(function(m){
      var mt = mealTotals(m);
      t.p += mt.p; t.c += mt.c; t.f += mt.f; t.kcal += mt.kcal;
    });
    return t;
  }

  /* ===================== FOOD LOOKUP ===================== */

     offline). Anything it doesn't recognize falls back to a live

    { name:"Egg whites", alias:["egg white","liquid egg whites"], p:10.9, c:0.7, f:0.2 },
    { name:"Whole eggs", alias:["egg","eggs","whole egg"], p:12.6, c:0.7, f:9.5 },

    { name:"Chicken breast, raw", alias:["raw chicken breast"], p:22.5, c:0, f:2.6 },
    { name:"Chicken thigh, cooked", alias:["chicken thigh","chicken thighs"], p:26, c:0, f:9.5 },
    { name:"Turkey breast, cooked", alias:["turkey breast","turkey"], p:29, c:0, f:1.8 },
    { name:"Lean ground beef 96/4, cooked", alias:["96/4 ground beef","ground beef 96/4","96 4 ground beef","lean ground beef"], p:29, c:0, f:5.6 },
    { name:"Ground beef 93/7, cooked", alias:["93/7 ground beef","ground beef 93/7"], p:27, c:0, f:8.5 },
    { name:"Ground beef 90/10, cooked", alias:["90/10 ground beef","ground beef 90/10","ground beef"], p:26, c:0, f:11 },
    { name:"Ground turkey 93/7, cooked", alias:["ground turkey"], p:27, c:0, f:10 },
    { name:"Steak, cooked", alias:["steak","sirloin steak","sirloin"], p:29, c:0, f:8 },
    { name:"Salmon, cooked", alias:["salmon"], p:25.4, c:0, f:8.1 },
    { name:"Tilapia, cooked", alias:["tilapia"], p:26.2, c:0, f:2.7 },

    { name:"Jasmine rice, cooked", alias:["jasmine rice","white rice cooked","cooked white rice","white rice","rice cooked","cooked rice","rice"], p:2.7, c:28.2, f:0.3 },

    { name:"Bread, whole wheat", alias:["whole wheat bread","wheat bread","bread"], p:13, c:43, f:3.4 },

    { name:"Tortilla, flour", alias:["tortilla","flour tortilla"], p:8, c:49, f:7.7 },
    { name:"Sweet potato, baked", alias:["sweet potato","baked sweet potato","sweet potatoes"], p:2, c:20.7, f:0.2 },
    { name:"White potato, baked", alias:["potato","baked potato","white potato","russet potato"], p:2.1, c:21.2, f:0.1 },

    { name:"Broccoli, cooked", alias:["broccoli"], p:2.4, c:7.2, f:0.4 },

    { name:"Green beans, cooked", alias:["green beans"], p:1.9, c:7.9, f:0.3 },
    { name:"Spinach, raw", alias:["spinach"], p:2.9, c:3.6, f:0.4 },
    { name:"Lettuce", alias:["romaine","romaine lettuce","salad greens","mixed greens"], p:1.2, c:3.3, f:0.3 },
    { name:"Bell pepper", alias:["bell peppers","peppers"], p:1, c:6, f:0.3 },

    { name:"BBQ sauce", alias:["barbecue sauce"], p:0.8, c:40, f:0.6 }
  ];

  function tokenize(s){
    return String(s).toLowerCase().replace(/[^a-z0-9\/\s]/g, " ").split(/\s+/).filter(function(w){
      return w && ["the","a","of","and","with","in","g","grams"].indexOf(w) < 0;
    }).map(function(w){
      return (w.length > 3 && w.slice(-1) === "s" && w.slice(-2) !== "ss") ? w.slice(0,-1) : w;
    });
  }

  function matchBuiltin(query){
    var qNorm = String(query).toLowerCase().replace(/[^a-z0-9\/\s]/g, " ").replace(/\s+/g," ").trim();
    if(!qNorm) return null;
    var qTokens = tokenize(query);
    var best = null, bestScore = 0;
    FOOD_DB.forEach(function(entry){
      var names = [entry.name].concat(entry.alias||[]);
      names.forEach(function(nm){
        var nNorm = nm.toLowerCase().replace(/[^a-z0-9\/\s]/g," ").replace(/\s+/g," ").trim();
        var score = 0;
        if(nNorm === qNorm){
          score = 1000;
        } else {
          var nTokens = tokenize(nm);
          if(!nTokens.length || !qTokens.length) return;
          var hits = 0;
          qTokens.forEach(function(qt){
            if(nTokens.indexOf(qt) >= 0) hits++;
          });
          // every query token must be in the name, or every name token in the query
          if(hits === qTokens.length){
            score = 100 + nTokens.length - Math.abs(nTokens.length - qTokens.length);
          } else {
            var rhits = 0;
            nTokens.forEach(function(nt){ if(qTokens.indexOf(nt) >= 0) rhits++; });
            if(rhits === nTokens.length) score = 50 + rhits;
          }
        }
        if(score > bestScore){ bestScore = score; best = entry; }
      });
    });
    return bestScore > 0 ? best : null;
  }

  function searchOpenFoodFacts(query){
    var params = new URLSearchParams({
      search_terms: query,
      search_simple: "1",
      action: "process",
      json: "1",
      page_size: "10",
      fields: "product_name,nutriments"
    });
    var url = "https://world.openfoodfacts.org/cgi/search.pl?" + params.toString();
    return fetch(url).then(function(res){
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function(data){
      var products = (data && data.products) || [];
      var qTokens = tokenize(query);
      // among products with usable per-100g data, pick the one whose name
      // best overlaps the query (first result is often an unrelated brand)
      var best = null, bestScore = -1;
      products.forEach(function(prod, idx){
        var n = prod.nutriments || {};
        var p = parseFloat(n.proteins_100g), c = parseFloat(n.carbohydrates_100g), f = parseFloat(n.fat_100g);
        if(isNaN(p) && isNaN(c) && isNaN(f)) return;
        var nameTokens = tokenize(prod.product_name || "");
        var hits = 0;
        qTokens.forEach(function(qt){
          if(nameTokens.some(function(nt){ return nt === qt || nt.indexOf(qt) === 0 || qt.indexOf(nt) === 0; })) hits++;
        });
        var coverage = qTokens.length ? hits/qTokens.length : 0;
        // shorter names are usually the plainer, more generic product
        var score = coverage*10 - nameTokens.length*0.1 - idx*0.05;
        if(score > bestScore){
          bestScore = score;
          best = { p:isNaN(p)?0:p, c:isNaN(c)?0:c, f:isNaN(f)?0:f, name: prod.product_name || query };
        }
      });
      if(!best) return null;
      return {
        description: best.name + " (Open Food Facts)",
        per100: { p: best.p, c: best.c, f: best.f },
        source: "off"
      };
    });
  }

  function lookupFood(query){
    var builtin = matchBuiltin(query);
    if(builtin){
      return Promise.resolve({
        description: builtin.name,
        per100: { p: builtin.p, c: builtin.c, f: builtin.f },

  function migrateMeals(meals){
    return meals.map(function(m){
      if(m.items.length && typeof m.items[0] === "object"){
        // retry anything the old lookup engine left unresolved
        m.items.forEach(function(item){
          if(item.mode === "auto" && item.status !== "ok"){
            item.status = "pending";
          }
        });
        return m;
      }
      var oldP = m.p||0, oldC = m.c||0, oldF = m.f||0;
      var items = m.items.map(function(text, idx){
        var match = /^~?(\d+(?:\.\d+)?)\s*g\b\s*(.*)$/i.exec(String(text).trim());
        if(match){
          return ing(match[2] || text, parseFloat(match[1]), "g");
        }
        return ingManual(text, idx===0 ? oldP : 0, idx===0 ? oldC : 0, idx===0 ? oldF : 0);
      });
      var m2 = { id:m.id, name:m.name, sub:m.sub, items:items };
      return m2;
    });
  }

  function todayStr(){
    var d = new Date();

  function loadState(){
    var s = null;
    var raw = localStorage.getItem(STORE_KEY);
    if(raw){
      try{ s = JSON.parse(raw); }catch(e){ s = null; }
    }
    if(!s) s = {};
    if(!s.daily) s.daily = {};
    if(!s.weights) s.weights = SEED_WEIGHTS.map(function(w){ return {date:w[0], weight:w[1]}; });
    if(!s.meals) s.meals = clone(DEFAULT_MEALS);
    s.meals = migrateMeals(s.meals);
    // engine v2 = built-in table + Open Food Facts. Re-resolve every auto
    // ingredient once so matches picked by the old USDA engine get replaced.
    // Old per100 values are kept until the fresh result lands, so totals
    // never flash to zero.
    if(s.engineV !== 2){
      s.meals.forEach(function(m){
        m.items.forEach(function(item){
          if(item.mode === "auto") item.status = "pending";
        });
      });
      s.engineV = 2;
    }
    if(!s.training) s.training = clone(DEFAULT_TRAINING);
    // split v2: rest day moves from day 7 to day 4, Arms moves to day 7.
    // Swap the whole day objects so any edited exercises travel with them.
    if(s.splitV !== 2){
      var d4 = s.training[3], d7 = s.training[6];
      if(d4 && d7 && !d4.rest && d7.rest){
        s.training[3] = d7;
        s.training[6] = d4;
        s.training[3].day = 4;
        s.training[6].day = 7;
        s.training[3].title = String(s.training[3].title||"").replace(/^Day\s*\d+/, "Day 4");
        s.training[6].title = String(s.training[6].title||"").replace(/^Day\s*\d+/, "Day 7");
      }
      s.splitV = 2;
    }
    if(!s.notes) s.notes = clone(DEFAULT_NOTES);
    if(!s.exerciseLog) s.exerciseLog = {};
    if(!s.weekLog) s.weekLog = {};
    // Lifting is tracked by week-of-block. Anchor the block to the earliest
    // logged session, or today for a fresh start.
    if(!s.blockStart){
      var earliest = null;
      Object.keys(s.exerciseLog).forEach(function(name){
        (s.exerciseLog[name]||[]).forEach(function(en){
          if(en.date && (!earliest || en.date < earliest)) earliest = en.date;
        });
      });
      s.blockStart = earliest || todayStr();
    }
    // liftV 1: fold any date-based exercise history into week buckets.
    if(s.liftV !== 1){
      Object.keys(s.exerciseLog).forEach(function(name){
        var entries = (s.exerciseLog[name]||[]).slice().sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
        entries.forEach(function(en){
          if(!en.sets) return;
          var wk = weekIndexOf(en.date, s.blockStart);
          if(!s.weekLog[wk]) s.weekLog[wk] = {};
          s.weekLog[wk][name] = en.sets; // later dates overwrite within a week
        });
      });
      s.liftV = 1;
    }
    return s;
  }

  function weekIndexOf(dateStr, blockStart){
    if(!dateStr || !blockStart) return 1;
    var a = new Date(blockStart+"T00:00:00").getTime();
    var b = new Date(dateStr+"T00:00:00").getTime();
    var days = Math.floor((b - a)/(24*3600*1000));
    return Math.max(1, Math.floor(days/7) + 1);
  }
  function currentWeek(){ return weekIndexOf(todayStr(), state.blockStart); }

  function getDay(dateStr){
    if(!state.daily[dateStr]){
      state.daily[dateStr] = { meals: state.meals.map(function(){ return false; }), lifted:false, cardio:false, restDay:false };
    }
    var d = state.daily[dateStr];
    if(!d.meals) d.meals = [];

  // Adherence: how much of the day's plan was completed.
  // Plan = every meal + a lift (unless it's a rest day) + cardio.
  function dayAdherence(day, mCount){
    if(mCount == null) mCount = day.meals ? day.meals.length : 0;
    var mealsChecked = 0;
    for(var i=0;i<mCount;i++){ if(day.meals && day.meals[i]) mealsChecked++; }
    var liftPlanned = !day.restDay;
    var planned = mCount + (liftPlanned?1:0) + 1;
    var checked = mealsChecked + (liftPlanned && day.lifted?1:0) + (day.cardio?1:0);
    return {
      pct: planned>0 ? Math.round(checked/planned*100) : 0,
      mealsChecked: mealsChecked, mCount: mCount,
      planned: planned, checked: checked, liftPlanned: liftPlanned
    };
  }

  function adherenceClass(pct){

  function setWeight(dateStr, weight){

    if(!found) state.weights.push({date:dateStr, weight:weight});
    state.weights.sort(function(a,b){ return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
    saveState();

  /* ===================== RENDER: DIET ===================== */

  var dietEditMode = false;
  var quickAddMi = null;
  var lookupQueueRunning = false;

  function ingStatusText(item){
    if(item.status === "pending") return "Looking up macros…";
    if(item.status === "ok"){
      var c = ingredientContribution(item);
      var rp = Math.round(c.p), rc = Math.round(c.c), rf = Math.round(c.f);
      return (item.matchDesc || "Matched") + " · " + rp+"P "+rc+"C "+rf+"F · "+(rp*4+rc*4+rf*9)+" kcal";
    }
    if(item.status === "unmatched") return "No match found — try a simpler name, or switch to Manual";
    if(item.status === "error") return "Lookup failed — check connection and retry";
    return "";
  }

  function formatIngredientLine(item){
    if(item.mode === "manual") return item.text;
    var qtyStr = (item.qty % 1 === 0) ? item.qty : round1(item.qty);
    return qtyStr + item.unit + " " + item.food;
  }

  function recalcAndPaint(mi, ii){
    if(ii != null){
      var item = state.meals[mi].items[ii];
      var statusRow = document.querySelector('.ing-status[data-meal-idx="'+mi+'"][data-item-idx="'+ii+'"]');
      if(statusRow && item){
        statusRow.className = "ing-status " + (item.status||"");
        var textEl = statusRow.querySelector(".ing-status-text");
        if(textEl) textEl.textContent = ingStatusText(item);
      }
    }
    var mt = mealTotals(state.meals[mi]);
    var card = document.querySelector('.diet-meal[data-meal-idx="'+mi+'"]');
    if(card){
      var k = card.querySelector('[data-meal-kcal]'); if(k) k.textContent = Math.round(mt.kcal) + ' kcal';
      var p = card.querySelector('[data-meal-p]'); if(p) p.textContent = 'P ' + Math.round(mt.p) + 'g';
      var c2 = card.querySelector('[data-meal-c]'); if(c2) c2.textContent = 'C ' + Math.round(mt.c) + 'g';
      var f = card.querySelector('[data-meal-f]'); if(f) f.textContent = 'F ' + Math.round(mt.f) + 'g';
    }
    var totals = getDailyTotals();
    var kEl = document.getElementById("dietSumKcal");
    var pEl = document.getElementById("dietSumP");
    var cEl = document.getElementById("dietSumC");
    var fEl = document.getElementById("dietSumF");
    if(kEl) kEl.textContent = Math.round(totals.kcal);
    if(pEl) pEl.textContent = Math.round(totals.p) + "g";
    if(cEl) cEl.textContent = Math.round(totals.c) + "g";
    if(fEl) fEl.textContent = Math.round(totals.f) + "g";
  }

  function relookupIngredient(mi, ii){
    var item = state.meals[mi].items[ii];
    if(!item || item.mode !== "auto" || !item.food || !item.food.trim()) return;
    item.status = "pending";
    saveState();
    recalcAndPaint(mi, ii);
    lookupFood(item.food).then(function(result){
      if(result){
        item.per100 = result.per100;
        item.matchDesc = result.description;
        item.status = "ok";
      } else {
        item.status = "unmatched";
      }
    }).catch(function(){
      item.status = "error";
    }).then(function(){
      saveState();
      recalcAndPaint(mi, ii);
    });
  }

  function processPendingLookups(){
    if(lookupQueueRunning) return;
    var queue = [];
    state.meals.forEach(function(m, mi){
      m.items.forEach(function(item, ii){
        if(item.mode === "auto" && item.status === "pending" && item.food && item.food.trim()){
          queue.push({mi:mi, ii:ii});
        }
      });
    });
    if(!queue.length) return;
    lookupQueueRunning = true;
    var idx = 0;
    function next(){
      if(idx >= queue.length){ lookupQueueRunning = false; return; }
      var ref = queue[idx++];
      var item = state.meals[ref.mi] && state.meals[ref.mi].items[ref.ii];
      if(!item || item.mode !== "auto"){ next(); return; }
      var wasBuiltin = false;
      lookupFood(item.food).then(function(result){
        if(result){
          wasBuiltin = result.source === "builtin";
          item.per100 = result.per100;
          item.matchDesc = result.description;
          item.status = "ok";
        } else {
          item.status = "unmatched";
        }
      }).catch(function(){
        item.status = "error";
      }).then(function(){
        saveState();
        recalcAndPaint(ref.mi, ref.ii);
        // built-in matches are instant; only pace real network lookups
        setTimeout(next, wasBuiltin ? 0 : 350);
      });
    }
    next();
  }

  var openDays = {};
  var trainingEditMode = false;
  var selectedWeek = null; // set to current week on first training render

  function parseSetCount(scheme){
    var m = /^(\d+)/.exec(scheme||"");
    var n = m ? parseInt(m[1],10) : 3;
    return clampInt(n,1,8);
  }

  function blankSets(n){
    var a = [];
    for(var i=0;i<n;i++) a.push({w:"", r:""});
    return a;
  }

  function getWeekSets(week, name){
    return state.weekLog[week] ? state.weekLog[week][name] : null;
  }

  // ensure a sets array exists for this exercise in this week, and return it
  function materializeWeekEntry(week, dayIdx, exIdx){
    var name = state.training[dayIdx].ex[exIdx][0];
    var scheme = state.training[dayIdx].ex[exIdx][1];
    if(!state.weekLog[week]) state.weekLog[week] = {};
    if(!state.weekLog[week][name]) state.weekLog[week][name] = blankSets(parseSetCount(scheme));
    return state.weekLog[week][name];
  }

  // previous weeks (< week) that have logged data for this exercise, newest first
  function weekHistory(name, week, count){
    var out = [];
    Object.keys(state.weekLog).map(Number)
      .filter(function(w){ return w < week; })
      .sort(function(a,b){ return b-a; })
      .forEach(function(w){
        var sets = state.weekLog[w][name];
        if(sets && formatSetsSummary(sets)) out.push({ week:w, sets:sets });
      });
    return out.slice(0, count || 3);
  }

  function formatSetsSummary(sets){
    var parts = sets.filter(function(s){ return s.w!==""&&s.w!=null; })
      .map(function(s){ return s.w; });
    return parts.join(" · ");
  }

  /* ===================== RENDER: LOG ===================== */

  function buildChartSVG(sorted){
    var W = 320, H = 150, padL = 34, padR = 10, padT = 14, padB = 22;
    var weights = sorted.map(function(w){ return w.weight; });
    var minW = Math.min.apply(null, weights);
    var maxW = Math.max.apply(null, weights);
    if(minW === maxW){ minW -= 2; maxW += 2; }
    var rangePad = (maxW-minW)*0.15;
    minW -= rangePad; maxW += rangePad;

    var innerW = W - padL - padR;
    var innerH = H - padT - padB;
    var n = sorted.length;

    function x(i){ return n===1 ? padL+innerW/2 : padL + (innerW * i/(n-1)); }
    function y(w){ return padT + innerH * (1 - (w-minW)/(maxW-minW)); }

    var pts = sorted.map(function(w,i){ return x(i)+","+y(w.weight); });
    var linePts = pts.join(" ");
    var areaPts = "M"+x(0)+","+(padT+innerH)+" L"+pts.join(" L")+" L"+x(n-1)+","+(padT+innerH)+" Z";

    var gridLines = "";
    for(var g=0; g<=2; g++){
      var gy = padT + innerH*g/2;
      var gv = maxW - (maxW-minW)*g/2;
      gridLines += '<line x1="'+padL+'" x2="'+(W-padR)+'" y1="'+gy+'" y2="'+gy+'" stroke="#222536" stroke-width="1"/>';
      gridLines += '<text x="'+(padL-6)+'" y="'+(gy+3)+'" font-size="8" fill="#5B6070" text-anchor="end">'+round1(gv)+'</text>';
    }

    var dots = sorted.map(function(w,i){
      return '<circle cx="'+x(i)+'" cy="'+y(w.weight)+'" r="'+(i===n-1?3.2:2.2)+'" fill="'+(i===n-1?'#00C896':'#00C896')+'" stroke="#0C0E14" stroke-width="1"/>';
    }).join("");

    var labelFirst = fmtDate(sorted[0].date);
    var labelLast = fmtDate(sorted[n-1].date);

    var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    svg += '<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="#00C896" stop-opacity="0.35"/>'+
      '<stop offset="100%" stop-color="#00C896" stop-opacity="0"/></linearGradient></defs>';
    svg += gridLines;
    svg += '<path d="'+areaPts+'" fill="url(#areaGrad)"/>';
    svg += '<polyline points="'+linePts+'" fill="none" stroke="#00C896" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
    svg += dots;
    svg += '<text x="'+padL+'" y="'+(H-4)+'" font-size="8" fill="#5B6070">'+labelFirst+'</text>';
    svg += '<text x="'+(W-padR)+'" y="'+(H-4)+'" font-size="8" fill="#5B6070" text-anchor="end">'+labelLast+'</text>';
    svg += '</svg>';
    return svg;
  }

  var openLifts = {};

  function topWeight(sets){
    var m = null;
    (sets||[]).forEach(function(s){
      var v = parseFloat(s.w);
      if(!isNaN(v)) m = m == null ? v : Math.max(m, v);
    });
    return m;
  }

  function buildSparkSVG(vals){
    var W = 96, H = 30, pad = 4;
    if(vals.length === 1) vals = [vals[0], vals[0]];
    var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
    if(min === max){ min -= 1; max += 1; }
    var pts = vals.map(function(v, i){
      var x = pad + (W - 2*pad) * i / (vals.length - 1);
      var y = pad + (H - 2*pad) * (1 - (v - min) / (max - min));
      return x.toFixed(1) + "," + y.toFixed(1);
    });
    return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">'+
      '<polyline points="'+pts.join(" ")+'" fill="none" stroke="#00C896" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+pts[pts.length-1].split(",")[0]+'" cy="'+pts[pts.length-1].split(",")[1]+'" r="2.6" fill="#00C896"/>'+
      '</svg>';
  }

  function liftTrend(tops){
    // recent trend: latest top weight vs up to 3 sessions back
    if(tops.length < 2) return null;
    var base = tops[Math.max(0, tops.length-4)];
    var change = tops[tops.length-1] - base;
    var dir = change >= 2.5 ? "up" : (change <= -2.5 ? "down" : "flat");
    return { change: change, dir: dir };
  }

  function getLiftData(){
    // plan order first, then any logged exercises no longer in the plan
    var names = [];
    state.training.forEach(function(d){
      d.ex.forEach(function(e){ if(!d.rest && names.indexOf(e[0]) < 0) names.push(e[0]); });
    });
    var weeks = Object.keys(state.weekLog).map(Number).sort(function(a,b){ return a-b; });
    weeks.forEach(function(wk){
      Object.keys(state.weekLog[wk]).forEach(function(n){ if(names.indexOf(n) < 0) names.push(n); });
    });

    var lifts = [];
    names.forEach(function(name){
      var points = [];
      weeks.forEach(function(wk){
        var sets = state.weekLog[wk][name];
        var t = sets ? topWeight(sets) : null;
        if(t != null) points.push({ week: wk, top: t, sets: sets });
      });
      if(points.length){
        var tops = points.map(function(p){ return p.top; });
        lifts.push({ name:name, points:points, tops:tops, trend: liftTrend(tops) });
      }
    });
    return lifts;
  }

  function trendBadgeHtml(trend){
    if(!trend) return "";
    if(trend.dir === "up") return '<span class="trend-badge trend-up">&#9650; Stronger</span>';
    if(trend.dir === "down") return '<span class="trend-badge trend-down">&#9660; Weaker</span>';
    return '<span class="trend-badge trend-flat">&#8212; Steady</span>';
  }

  function adherenceDays(){
    var out = [];
    Object.keys(state.daily).forEach(function(date){
      var day = state.daily[date];
      var mCount = day.meals ? day.meals.length : 0;
      var adh = dayAdherence(day, mCount);
      if(adh.checked > 0) out.push({ date:date, adh:adh, day:day });
    });
    out.sort(function(a,b){ return a.date<b.date?1:(a.date>b.date?-1:0); }); // newest first
    return out;
  }

  /* ===================== BACKUP & RESTORE ===================== */

  function backupData(){ return localStorage.getItem(STORE_KEY) || JSON.stringify(state); }

  function buildBackupHtml(){
    var html = '<div class="section-title">Backup &amp; Restore</div>';
    html += '<div class="card">';
    html += '<div class="card-sub" style="margin-bottom:.85rem;line-height:1.5;">Your data lives only on this device. If the app is ever deleted your data goes with it — so save a backup and keep it somewhere safe. You can restore it here on any device.</div>';
    html += '<div class="backup-btns">';
    html += '<button class="backup-btn primary" id="backupCopy">Copy backup code</button>';
    html += '<button class="backup-btn" id="backupDownload">Download file</button>';
    if(navigator.share) html += '<button class="backup-btn" id="backupShare">Share…</button>';
    html += '</div>';
    html += '<div class="backup-flash" id="backupFlash"></div>';
    html += '<div class="backup-divider"></div>';
    html += '<div class="card-sub" style="margin-bottom:.6rem;">Restore from a backup — this replaces all current data:</div>';
    html += '<label class="backup-file-label">Choose backup file<input type="file" accept="application/json,.json" id="backupFile"></label>';
    html += '<div class="backup-or">or paste a backup code</div>';
    html += '<textarea class="backup-textarea" id="backupPaste" placeholder="Paste backup code here"></textarea>';
    html += '<button class="backup-btn primary" id="backupRestore">Restore from code</button>';
    html += '</div>';
    return html;
  }

  function backupFlash(msg){
    var el = document.getElementById("backupFlash");
    if(el){ el.textContent = msg; setTimeout(function(){ if(el) el.textContent = ""; }, 3500); }
  }

  function applyRestore(text){
    var parsed;
    try{ parsed = JSON.parse(text); }
    catch(e){ backupFlash("That doesn't look like a valid backup code."); return; }
    if(!parsed || typeof parsed !== "object" || Array.isArray(parsed)){
      backupFlash("That doesn't look like a valid backup."); return;
    }
    if(!window.confirm("Replace ALL current data on this device with this backup? This can't be undone.")) return;
    localStorage.setItem(STORE_KEY, JSON.stringify(parsed));
    location.reload();
  }

  function bindBackupEvents(){
    var copyBtn = document.getElementById("backupCopy");
    if(copyBtn) copyBtn.addEventListener("click", function(){
      var text = backupData();
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          backupFlash("Backup code copied — paste it into Notes or email to keep it safe.");
        }, function(){
          var ta = document.getElementById("backupPaste"); if(ta){ ta.value = text; ta.focus(); ta.select(); }
          backupFlash("Couldn't auto-copy — the code is shown below, select and copy it.");
        });
      } else {
        var ta2 = document.getElementById("backupPaste"); if(ta2){ ta2.value = text; ta2.focus(); ta2.select(); }
        backupFlash("Select the code shown below and copy it.");
      }
    });

    var dlBtn = document.getElementById("backupDownload");
    if(dlBtn) dlBtn.addEventListener("click", function(){
      var text = backupData();
      var blob = new Blob([text], {type:"application/json"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "warrior-fit-tracker-backup-"+todayStr()+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
      backupFlash("Backup file saved.");
    });

    var shareBtn = document.getElementById("backupShare");
    if(shareBtn) shareBtn.addEventListener("click", function(){
      var text = backupData();
      navigator.share({ title:"Warrior Fit Tracker backup", text:text }).catch(function(){});
    });

    var fileInp = document.getElementById("backupFile");
    if(fileInp) fileInp.addEventListener("change", function(){
      var f = fileInp.files && fileInp.files[0];
      if(!f) return;
      var reader = new FileReader();
      reader.onload = function(){ applyRestore(String(reader.result)); };
      reader.onerror = function(){ backupFlash("Couldn't read that file."); };
      reader.readAsText(f);
    });

    var restoreBtn = document.getElementById("backupRestore");
    if(restoreBtn) restoreBtn.addEventListener("click", function(){
      var ta = document.getElementById("backupPaste");
      var text = ta ? ta.value.trim() : "";
      if(!text){ backupFlash("Paste a backup code first."); return; }
      applyRestore(text);
    });
  }

  /* ===================== RENDER: PROGRESS ===================== */

  var progressWeeks = 12; // 0 = all time

  function fmtLongDate(dateStr){
    var parts = dateStr.split("-");
    var d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    return d.toLocaleDateString(undefined, {month:"short", day:"numeric", year:"numeric"});
  }

  function weeksBetween(a, b){
    return Math.round((new Date(b).getTime() - new Date(a).getTime()) / (7*24*3600*1000));
  }

  function getBlockLifts(weeks){
    var lifts = getLiftData();
    var minWeek = weeks > 0 ? (currentWeek() - weeks + 1) : -Infinity;
    var out = [];
    lifts.forEach(function(l){
      var points = l.points.filter(function(p){ return p.week >= minWeek; });
      if(!points.length) return;
      var tops = points.map(function(p){ return p.top; });
      var start = tops[0], end = tops[tops.length-1];
      var change = end - start;
      var pct = start ? (change/start)*100 : 0;
      var dir = change >= 2.5 ? "up" : (change <= -2.5 ? "down" : "flat");
      out.push({
        name: l.name, points: points, tops: tops,
        start: start, end: end, change: change, pct: pct, dir: dir,
        startWeek: points[0].week, endWeek: points[points.length-1].week
      });
    });
    return out;
  }

  function renderProgress(){
    var html = '';
    html += '<div class="page-title">Progress</div>';
    html += '<div class="page-sub">Strength across your training block</div>';

    var opts = [[4,"4 wk"],[8,"8 wk"],[12,"12 wk"],[0,"All"]];
    html += '<div class="block-selector">';
    opts.forEach(function(o){
      html += '<button class="block-chip'+(progressWeeks===o[0]?' active':'')+'" data-weeks="'+o[0]+'">'+o[1]+'</button>';
    });
    html += '</div>';

    var lifts = getBlockLifts(progressWeeks);
    var withChange = lifts.filter(function(l){ return l.points.length >= 2; });

    if(!lifts.length){
      html += '<div class="card"><div class="empty-hint">No lifts logged in this window. Enter weights on the Training tab, then come back to see your block progression.</div></div>';
      document.getElementById("content").innerHTML = html;
      bindProgressEvents();
      return;
    }

    // ----- headline analysis -----
    var ups = withChange.filter(function(l){ return l.dir==="up"; }).length;
    var downs = withChange.filter(function(l){ return l.dir==="down"; }).length;
    var verdict, vClass;
    if(!withChange.length){ verdict = "Just getting started"; vClass = "trend-flat"; }
    else if(ups > downs){ verdict = "Getting stronger"; vClass = "trend-up"; }
    else if(downs > ups){ verdict = "Losing ground"; vClass = "trend-down"; }
    else { verdict = "Holding steady"; vClass = "trend-flat"; }

    var allWeeks = [];
    lifts.forEach(function(l){ allWeeks.push(l.startWeek, l.endWeek); });
    allWeeks.sort(function(a,b){ return a-b; });
    var firstWeek = allWeeks[0], lastWeek = allWeeks[allWeeks.length-1];
    var spanWeeks = lastWeek - firstWeek + 1;
    var totalSessions = lifts.reduce(function(s,l){ return s + l.points.length; }, 0);
    var avgPct = withChange.length ? withChange.reduce(function(s,l){ return s+l.pct; },0)/withChange.length : 0;

    html += '<div class="card analysis-card">';
    html += '<div class="card-title">Block Analysis</div>';
    html += '<div class="analysis-verdict '+vClass+'">'+verdict+'</div>';
    var summary;
    if(withChange.length){
      summary = "Across " + spanWeeks + " week" + (spanWeeks===1?"":"s") +
        " and " + totalSessions + " logged session" + (totalSessions===1?"":"s") + ", " +
        ups + " of " + withChange.length + " lift" + (withChange.length===1?"":"s") + " went up" +
        (avgPct!==0 ? " — averaging " + (avgPct>0?"+":"") + round1(avgPct) + "% per lift." : ".");
    } else {
      summary = "Logged " + totalSessions + " week" + (totalSessions===1?"":"s") +
        " so far. Fill in a second week to measure change.";
    }
    html += '<div class="analysis-verdict-sub">'+summary+'</div>';

    html += '<div class="analysis-row"><span class="analysis-label">Block window</span><span class="analysis-val">Wk '+firstWeek+' → Wk '+lastWeek+'</span></div>';
    html += '<div class="analysis-row"><span class="analysis-label">Exercises tracked</span><span class="analysis-val">'+lifts.length+'</span></div>';
    html += '<div class="analysis-row"><span class="analysis-label">Weeks logged</span><span class="analysis-val">'+totalSessions+'</span></div>';

    if(withChange.length){
      var best = null, worst = null;
      withChange.forEach(function(l){
        if(l.change>0 && (!best || l.change>best.change)) best = l;
        if(l.change<0 && (!worst || l.change<worst.change)) worst = l;
      });
      if(best) html += '<div class="analysis-row"><span class="analysis-label">Biggest gain</span><span class="analysis-val trend-up">'+esc(best.name)+' +'+round1(best.change)+' lb</span></div>';
      if(worst) html += '<div class="analysis-row"><span class="analysis-label">Biggest drop</span><span class="analysis-val trend-down">'+esc(worst.name)+' '+round1(worst.change)+' lb</span></div>';
    }
    html += '</div>';

    // ----- per-lift start -> end cards -----
    html += '<div class="section-title">Start &rarr; Now</div>';
    lifts.forEach(function(l){
      html += '<div class="card block-lift">';
      html += '<div class="block-lift-head"><span class="block-lift-name">'+esc(l.name)+'</span>'+trendBadgeHtml({dir:l.dir})+'</div>';
      html += '<div class="block-lift-body">';
      html += '<div class="block-endpoint"><div class="block-ep-w">'+round1(l.start)+'<small> lb</small></div><div class="block-ep-l">Wk '+l.startWeek+'</div></div>';
      html += '<div class="block-arrow">';
      if(l.points.length >= 2){
        var deltaCls = l.dir==="up" ? "trend-up" : (l.dir==="down" ? "trend-down" : "");
        html += '<div class="block-delta '+deltaCls+'">'+(l.change>0?"+":"")+round1(l.change)+' lb</div>';
        html += '<div class="block-arrow-line">'+buildSparkSVG(l.tops)+'</div>';
        html += '<div class="block-pct '+deltaCls+'">'+(l.pct>0?"+":"")+round1(l.pct)+'%</div>';
      } else {
        html += '<div class="block-arrow-line block-single">1 week</div>';
      }
      html += '</div>';
      html += '<div class="block-endpoint"><div class="block-ep-w">'+round1(l.end)+'<small> lb</small></div><div class="block-ep-l">Wk '+l.endWeek+'</div></div>';
      html += '</div>';
      html += '</div>';
    });

    document.getElementById("content").innerHTML = html;
    bindProgressEvents();
  }

  function bindProgressEvents(){
    document.querySelectorAll(".block-chip").forEach(function(btn){
      btn.addEventListener("click", function(){
        progressWeeks = parseInt(btn.getAttribute("data-weeks"),10);
        renderProgress();
      });
    });
  }

  /* ===================== TAB CONTROL ===================== */

  var TABS = { today: renderToday, diet: renderDiet, training: renderTraining, progress: renderProgress, log: renderLog };
  var TAB_ORDER = ["today","diet","training","progress","log"];
  var LAST_TAB_KEY = "fittrack.lastTab";

  function switchTab(name){
    if(!state) return;
    if(!TABS[name]) name = "today";
    localStorage.setItem(LAST_TAB_KEY, name);
    document.querySelectorAll(".tabbtn").forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-tab")===name);
    });
    window.scrollTo(0,0);
    TABS[name]();
  }

  document.querySelectorAll(".tabbtn").forEach(function(btn){
    btn.addEventListener("click", function(){
      switchTab(btn.getAttribute("data-tab"));
    });
  });

  /* ===================== WELCOME (first run) ===================== */

  function renderWelcome(){
    document.getElementById("tabbar").style.display = "none";
    var html = '';
    html += '<div class="welcome">';
    html += '<div class="welcome-icon"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="9.5" width="3.5" height="5" rx="1"/><rect x="19.5" y="9.5" width="3.5" height="5" rx="1"/><rect x="5.5" y="8" width="2.8" height="8" rx="1"/><rect x="15.7" y="8" width="2.8" height="8" rx="1"/><rect x="8.3" y="11" width="7.4" height="2" rx="0.5"/></svg></div>';
    html += '<h1 class="welcome-title">Warrior Fit Tracker</h1>';
    html += '<p class="welcome-sub">Track meals, training, and bodyweight. Everything is saved on this device only — nothing is uploaded anywhere.</p>';
    html += '<button class="welcome-btn primary" id="welcomeBlank">Start fresh</button>';
    html += '<div class="welcome-btn-sub">Blank meals, blank training days — build your own plan</div>';
    html += '<button class="welcome-btn" id="welcomeExample">Try the example plan</button>';
    html += '<div class="welcome-btn-sub">A filled-in 6-meal diet and 6-day training split to explore or edit</div>';
    html += '</div>';
    document.getElementById("content").innerHTML = html;

    document.getElementById("welcomeBlank").addEventListener("click", function(){ startWith("blank"); });
    document.getElementById("welcomeExample").addEventListener("click", function(){ startWith("example"); });
  }

  function startWith(kind){
    state = kind === "blank" ? blankState() : exampleState();
    saveState();
    document.getElementById("tabbar").style.display = "";
    switchTab("today");
  }

  if(state){
    var startTab = localStorage.getItem(LAST_TAB_KEY);
    if(TAB_ORDER.indexOf(startTab) === -1) startTab = "today";
    switchTab(startTab);
  } else {
    renderWelcome();
  }

})();
</script>
</body>
</html>
