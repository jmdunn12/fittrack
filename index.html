<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>FitTrack</title>
<meta name="description" content="Personal nutrition, training, and bodyweight tracker">
<meta name="theme-color" content="#0C0E14">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<style>
  :root{
    --bg:#0C0E14;
    --card:#13151E;
    --border:#222536;
    --accent:#00C896;
    --accent-dim:#00C89633;
    --protein:#FF6B6B;
    --carbs:#4D9FFF;
    --fat:#FFD166;
    --text:#F2F3F7;
    --text-dim:#8A8F9E;
    --text-faint:#5B6070;
    --danger:#FF6B6B;
    --radius:14px;
    --safe-t:env(safe-area-inset-top);
    --safe-b:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left);
    --safe-r:env(safe-area-inset-right);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none;
    min-height:100dvh;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100dvh;
    position:relative;
    padding-left:var(--safe-l);
    padding-right:var(--safe-r);
  }
  main{
    padding:calc(1rem + var(--safe-t)) 1rem calc(6.5rem + var(--safe-b));
    min-height:100dvh;
  }
  h1,h2,h3,p{margin:0;}
  .page-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:.25rem;}
  .page-sub{color:var(--text-dim);font-size:.85rem;margin-bottom:1.1rem;}

  /* ---- Tab bar ---- */
  .tabbar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:0;
    width:100%;
    max-width:480px;
    display:flex;
    background:rgba(19,21,30,0.92);
    -webkit-backdrop-filter:blur(14px);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    padding:.4rem max(.5rem, var(--safe-l)) calc(.4rem + var(--safe-b)) max(.5rem, var(--safe-r));
    z-index:50;
  }
  .tabbtn{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:.2rem;
    background:none;
    border:none;
    color:var(--text-faint);
    font-family:inherit;
    font-size:.68rem;
    font-weight:600;
    padding:.4rem 0 .3rem;
    border-radius:10px;
  }
  .tabbtn svg{width:22px;height:22px;}
  .tabbtn.active{color:var(--accent);}
  .tabbtn:active{background:rgba(255,255,255,0.04);}

  /* ---- Cards ---- */
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1rem;
    margin-bottom:.75rem;
  }
  .card-title{font-weight:700;font-size:1rem;}
  .card-sub{color:var(--text-dim);font-size:.78rem;margin-top:.1rem;}

  /* ---- Totals bar (Today) ---- */
  .totals-card{padding:1rem 1rem 1.1rem;}
  .totals-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.7rem;}
  .totals-kcal{font-size:1.6rem;font-weight:800;letter-spacing:-0.02em;}
  .totals-kcal span{font-size:.85rem;font-weight:600;color:var(--text-dim);}
  .macro-row{display:flex;flex-direction:column;gap:.55rem;}
  .macro-line{display:flex;align-items:center;gap:.6rem;}
  .macro-label{width:2.6rem;font-size:.72rem;font-weight:700;color:var(--text-dim);flex-shrink:0;}
  .macro-track{flex:1;height:7px;border-radius:6px;background:#1D2030;overflow:hidden;}
  .macro-fill{height:100%;border-radius:6px;transition:width .35s ease;}
  .macro-val{width:5.4rem;text-align:right;font-size:.72rem;color:var(--text-dim);flex-shrink:0;font-variant-numeric:tabular-nums;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

  /* ---- Meal check list (Today) ---- */
  .meal-item{
    display:flex;
    align-items:center;
    gap:.75rem;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:.85rem .9rem;
    margin-bottom:.6rem;
    transition:border-color .2s, background .2s;
  }
  .meal-item.checked{border-color:var(--accent);background:linear-gradient(0deg, var(--accent-dim), var(--accent-dim)), var(--card);}
  .check-circle{
    width:24px;height:24px;border-radius:50%;
    border:2px solid var(--text-faint);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .2s, background .2s;
  }
  .meal-item.checked .check-circle{border-color:var(--accent);background:var(--accent);}
  .check-circle svg{width:14px;height:14px;opacity:0;transition:opacity .15s;}
  .meal-item.checked .check-circle svg{opacity:1;}
  .meal-info{flex:1;min-width:0;}
  .meal-name{font-weight:700;font-size:.92rem;}
  .meal-name-sub{color:var(--text-dim);font-size:.72rem;margin-top:.1rem;}
  .meal-macros{display:flex;gap:.4rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
  .macro-chip{font-size:.65rem;font-weight:700;padding:.15rem .4rem;border-radius:6px;}
  .macro-chip.p{color:var(--protein);background:#FF6B6B22;}
  .macro-chip.c{color:var(--carbs);background:#4D9FFF22;}
  .macro-chip.f{color:var(--fat);background:#FFD16622;}

  /* ---- Toggle buttons ---- */
  .toggle-row{display:flex;gap:.6rem;margin-bottom:.75rem;}
  .toggle-btn{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-family:inherit;
    font-weight:700;
    font-size:.85rem;
    padding:.8rem 0;
    border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;gap:.45rem;
  }
  .toggle-btn svg{width:18px;height:18px;}
  .toggle-btn.on{background:var(--accent);border-color:var(--accent);color:#062019;}

  /* ---- Weight input ---- */
  .weight-row{display:flex;gap:.6rem;align-items:stretch;}
  .weight-input{
    flex:1;
    background:#0D0F17;
    border:1px solid var(--border);
    color:var(--text);
    font-family:inherit;
    font-size:1rem;
    font-weight:600;
    padding:.8rem .9rem;
    border-radius:var(--radius);
    min-width:0;
  }
  .weight-input:focus{outline:none;border-color:var(--accent);}
  .save-btn{
    background:var(--accent);
    color:#062019;
    border:none;
    font-family:inherit;
    font-weight:800;
    font-size:.9rem;
    padding:.8rem 1.2rem;
    border-radius:var(--radius);
    white-space:nowrap;
  }
  .save-btn:active{opacity:.8;}
  .save-flash{color:var(--accent);font-size:.78rem;font-weight:700;margin-top:.5rem;height:1rem;}

  /* ---- Diet tab ---- */
  .target-strip{display:flex;gap:.5rem;margin-bottom:1rem;}
  .target-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.6rem .3rem;text-align:center;}
  .target-pill .n{font-size:1rem;font-weight:800;}
  .target-pill .l{font-size:.62rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:.1rem;}
  .diet-meal .card-title{display:flex;justify-content:space-between;align-items:baseline;}
  .diet-meal .kcal-tag{font-size:.72rem;color:var(--text-dim);font-weight:700;}
  .ingredient-list{list-style:none;padding:0;margin:.6rem 0 .7rem;}
  .ingredient-list li{
    font-size:.85rem;color:var(--text);
    padding:.3rem 0;
    border-bottom:1px solid var(--border);
  }
  .ingredient-list li:last-child{border-bottom:none;}
  .diet-macros{display:flex;gap:.5rem;}
  .diet-macros .macro-chip{font-size:.68rem;padding:.25rem .5rem;}

  /* ---- Training tab ---- */
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.6rem;overflow:hidden;}
  .day-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:.9rem 1rem;
  }
  .day-head-l{display:flex;align-items:center;gap:.7rem;}
  .day-num{
    width:30px;height:30px;border-radius:9px;
    background:#1D2030;color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:.8rem;flex-shrink:0;
  }
  .day-card.rest .day-num{color:var(--text-faint);}
  .day-title{font-weight:700;font-size:.92rem;}
  .day-focus{color:var(--text-dim);font-size:.72rem;margin-top:.1rem;}
  .chev{width:18px;height:18px;color:var(--text-faint);transition:transform .2s;flex-shrink:0;}
  .day-card.open .chev{transform:rotate(180deg);}
  .day-body{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .day-card.open .day-body{max-height:2400px;}
  .day-body-inner{padding:0 1rem 1rem;}
  .ex-list{list-style:none;margin:0;padding:0;}
  .ex-list li{
    font-size:.83rem;padding:.45rem 0;border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;gap:.6rem;
  }
  .ex-list li:last-child{border-bottom:none;}
  .ex-list .ex-name{color:var(--text);}
  .ex-list .ex-scheme{color:var(--text-dim);font-size:.76rem;white-space:nowrap;flex-shrink:0;}
  .notes-card ul{margin:.5rem 0 0;padding-left:1.1rem;}
  .notes-card li{font-size:.85rem;margin-bottom:.45rem;color:var(--text);}
  .notes-card li:last-child{margin-bottom:0;}

  /* ---- Log tab ---- */
  .stat-row{display:flex;gap:.6rem;margin-bottom:.9rem;}
  .stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;}
  .stat-card .v{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;}
  .stat-card .v small{font-size:.7rem;color:var(--text-dim);font-weight:600;}
  .stat-card .l{font-size:.68rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:.2rem;}
  .chart-card{padding:1rem 1rem .5rem;}
  .chart-wrap{width:100%;}
  .chart-wrap svg{width:100%;height:auto;display:block;}
  table.log-table{width:100%;border-collapse:collapse;font-size:.83rem;}
  table.log-table th{
    text-align:left;color:var(--text-dim);font-size:.68rem;text-transform:uppercase;
    letter-spacing:.04em;font-weight:700;padding-bottom:.5rem;border-bottom:1px solid var(--border);
  }
  table.log-table td{padding:.55rem 0;border-bottom:1px solid var(--border);}
  table.log-table tr:last-child td{border-bottom:none;}
  table.log-table td.wt{font-weight:700;font-variant-numeric:tabular-nums;}
  table.log-table tr.today-row td{color:var(--accent);font-weight:700;}
  table.log-table td.delta{font-size:.76rem;color:var(--text-dim);}
  .delta.up{color:var(--fat);}
  .delta.down{color:var(--accent);}
  .empty-hint{color:var(--text-dim);font-size:.85rem;text-align:center;padding:1.5rem 0;}

  /* ---- Edit mode controls ---- */
  .page-head-row{display:flex;justify-content:space-between;align-items:center;gap:.75rem;margin-bottom:.25rem;}
  .page-head-row .page-title{margin-bottom:0;}
  .edit-toggle-btn{
    background:var(--card);border:1px solid var(--border);color:var(--accent);
    font-family:inherit;font-weight:700;font-size:.78rem;padding:.45rem .9rem;border-radius:10px;
    display:flex;align-items:center;gap:.35rem;flex-shrink:0;
  }
  .edit-toggle-btn svg{width:14px;height:14px;}
  .edit-toggle-btn.active{background:var(--accent);color:#062019;border-color:var(--accent);}

  .field-input{
    width:100%;background:#0D0F17;border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-size:.85rem;padding:.55rem .65rem;border-radius:10px;min-width:0;
  }
  .field-input:focus{outline:none;border-color:var(--accent);}
  .field-row{display:flex;gap:.5rem;margin-bottom:.6rem;}
  .field-row .field-input{flex:1;min-width:0;}

  .macro-edit-row{display:flex;gap:.5rem;}
  .macro-edit{flex:1;}
  .macro-edit label{display:block;font-size:.62rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.25rem;}
  .macro-edit input{
    width:100%;background:#0D0F17;border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-size:.9rem;font-weight:700;padding:.5rem;border-radius:8px;text-align:center;
  }
  .macro-edit input:focus{outline:none;border-color:var(--accent);}

  .edit-line{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;}
  .edit-line .field-input{flex:1;min-width:0;}
  .remove-line-btn{
    width:30px;height:30px;flex-shrink:0;border-radius:8px;
    background:#FF6B6B1A;color:var(--danger);border:1px solid #FF6B6B33;
    font-size:1.05rem;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .add-line-btn{
    width:100%;background:none;border:1px dashed var(--border);color:var(--text-dim);
    font-family:inherit;font-weight:700;font-size:.82rem;padding:.55rem;border-radius:10px;margin-top:.1rem;margin-bottom:.6rem;
  }

  .ex-edit-row{display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center;}
  .ex-edit-row .field-input{flex:1;min-width:0;}
  .ex-edit-row .field-input.scheme-input{flex:0 0 6.5rem;}

  /* ---- Ingredient rows (Diet) ---- */
  .usda-key-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;}
  .usda-key-row input{flex:1;min-width:0;}
  .usda-key-hint{color:var(--text-faint);font-size:.68rem;margin-bottom:1rem;line-height:1.4;}
  .ing-row{margin-bottom:.6rem;}
  .ing-row-top{display:flex;gap:.5rem;align-items:flex-end;}
  .ing-field{flex:1;min-width:0;}
  .ing-field.ing-field-grams{flex:0 0 5.5rem;}
  .ing-field label{display:block;font-size:.62rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.25rem;}
  .ing-row-top .remove-line-btn{flex-shrink:0;}
  .ing-status{font-size:.72rem;color:var(--text-faint);margin-top:.35rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .ing-status.ok{color:var(--text-dim);}
  .ing-status.unmatched, .ing-status.error, .ing-status.ratelimited{color:var(--fat);}
  .ing-refresh-btn{
    background:none;border:1px solid var(--border);color:var(--text-dim);
    font-family:inherit;font-size:.68rem;font-weight:700;padding:.15rem .5rem;border-radius:6px;flex-shrink:0;
  }
  .ing-manual-row{display:flex;gap:.4rem;margin-top:.4rem;}
  .ing-manual-row .macro-edit{flex:1;}
  .ing-manual-row .macro-edit input{font-size:.8rem;padding:.4rem;}
  .ing-contrib{font-size:.72rem;color:var(--text-dim);}

  /* ---- Exercise set tracking ---- */
  .ex-block{padding:.7rem 0;border-bottom:1px solid var(--border);}
  .ex-block:last-child{border-bottom:none;}
  .ex-row-head{display:flex;justify-content:space-between;gap:.6rem;font-size:.83rem;}
  .ex-row-head .ex-name{color:var(--text);font-weight:600;}
  .ex-row-head .ex-scheme{color:var(--text-dim);font-size:.76rem;white-space:nowrap;flex-shrink:0;}
  .ex-last{color:var(--text-faint);font-size:.72rem;margin-top:.3rem;}
  .set-rows{margin-top:.55rem;display:flex;flex-direction:column;gap:.4rem;}
  .set-row{display:flex;align-items:center;gap:.4rem;}
  .set-idx{width:1.1rem;font-size:.72rem;color:var(--text-faint);flex-shrink:0;text-align:center;}
  .set-input{
    flex:1;min-width:0;background:#0D0F17;border:1px solid var(--border);color:var(--text);
    font-family:inherit;font-size:.82rem;font-weight:600;padding:.45rem .5rem;border-radius:8px;text-align:center;
  }
  .set-input:focus{outline:none;border-color:var(--accent);}
  .set-x{color:var(--text-faint);font-size:.72rem;flex-shrink:0;}
  .set-remove-btn{
    width:24px;height:24px;flex-shrink:0;border-radius:7px;background:none;border:none;
    color:var(--text-faint);font-size:1rem;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .add-set-btn{
    align-self:flex-start;background:none;border:1px dashed var(--border);color:var(--text-dim);
    font-family:inherit;font-weight:700;font-size:.75rem;padding:.35rem .7rem;border-radius:8px;
  }
</style>
</head>
<body>
<div id="app">
  <main id="content"></main>
  <nav class="tabbar" id="tabbar">
    <button class="tabbtn" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Today
    </button>
    <button class="tabbtn" data-tab="diet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2v8a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V2"/><path d="M9 12v10"/><path d="M17 2c-1.8 1.6-2 3.5-2 6s.5 3 2 4v10"/></svg>
      Diet
    </button>
    <button class="tabbtn" data-tab="training">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="9.5" width="3.5" height="5" rx="1"/><rect x="19.5" y="9.5" width="3.5" height="5" rx="1"/><rect x="5.5" y="8" width="2.8" height="8" rx="1"/><rect x="15.7" y="8" width="2.8" height="8" rx="1"/><rect x="8.3" y="11" width="7.4" height="2" rx="0.5"/></svg>
      Training
    </button>
    <button class="tabbtn" data-tab="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
      Log
    </button>
  </nav>
</div>

<script>
(function(){
  "use strict";

  /* ===================== DATA ===================== */

  function ing(food, qty, unit){
    return { mode:"auto", food:food, qty:qty, unit:unit||"g", per100:null, matchDesc:null, status:"pending" };
  }
  function ingManual(text, p, c, f){
    return { mode:"manual", text:text, manual:{p:p, c:c, f:f} };
  }

  var DEFAULT_MEALS = [
    { id:1, name:"Meal 1", sub:"Breakfast", items:[
      ing("Egg whites", 180, "g"),
      ing("Whole eggs", 90, "g"),
      ing("Dry oats", 40, "g"),
      ing("Blueberries", 100, "g"),
      ing("Peanut butter", 16, "g")
    ]},
    { id:2, name:"Meal 2", sub:"Lunch", items:[
      ing("Chicken breast, cooked", 160, "g"),
      ing("Jasmine rice, cooked", 70, "g"),
      ing("Cucumber", 150, "g"),
      ing("Olive oil", 6, "g")
    ]},
    { id:3, name:"Meal 3", sub:"Mid-Afternoon", items:[
      ing("Chicken breast, cooked", 160, "g"),
      ing("Sweet potato, baked", 180, "g"),
      ing("Brussels sprouts, cooked", 150, "g"),
      ing("Olive oil", 5, "g")
    ]},
    { id:4, name:"Meal 4", sub:"Pre-Workout", items:[
      ingManual("1 scoop whey protein", 25, 3, 1)
    ]},
    { id:5, name:"Meal 5", sub:"Post-Workout / Dinner", items:[
      ing("Lean ground beef 96/4, cooked", 160, "g"),
      ing("Jasmine rice, cooked", 50, "g"),
      ing("Olive oil", 8, "g")
    ]},
    { id:6, name:"Meal 6", sub:"Before Bed", items:[
      ing("Nonfat Greek yogurt", 200, "g"),
      ing("Almonds", 30, "g"),
      ing("Strawberries", 80, "g")
    ]}
  ];

  function ingredientContribution(item){
    if(item.mode === "manual"){
      return item.manual ? {p:item.manual.p, c:item.manual.c, f:item.manual.f} : {p:0,c:0,f:0};
    }
    if(!item.per100) return {p:0, c:0, f:0};
    var ratio = item.qty/100;
    return {p:item.per100.p*ratio, c:item.per100.c*ratio, f:item.per100.f*ratio};
  }

  function mealTotals(m){
    var t = {p:0, c:0, f:0};
    m.items.forEach(function(item){
      var c = ingredientContribution(item);
      t.p += c.p; t.c += c.c; t.f += c.f;
    });
    t.kcal = t.p*4 + t.c*4 + t.f*9;
    return t;
  }

  function getDailyTotals(){
    var t = {kcal:0, p:0, c:0, f:0};
    state.meals.forEach(function(m){
      var mt = mealTotals(m);
      t.p += mt.p; t.c += mt.c; t.f += mt.f; t.kcal += mt.kcal;
    });
    return t;
  }

  /* ===================== USDA FOOD LOOKUP ===================== */

  var USDA_KEY_STORE = "fittrack.usdaKey";

  function getUsdaKey(){ return localStorage.getItem(USDA_KEY_STORE) || "DEMO_KEY"; }
  function setUsdaKey(k){
    if(k && k.trim()) localStorage.setItem(USDA_KEY_STORE, k.trim());
    else localStorage.removeItem(USDA_KEY_STORE);
  }

  function tokenize(s){
    return String(s).toLowerCase().replace(/[^a-z0-9\s]/g, " ").split(/\s+/).filter(function(w){
      return w && ["the","a","of","and","with","in"].indexOf(w) < 0;
    });
  }

  var PROCESSED_WORDS = ["breaded","battered","fried","tenders","nuggets","patty","patties","canned","dried","powder","powdered","microwaved","sausage","frankfurter","luncheon","smoked","cured","pickled","candied","sweetened","concentrate","juice","chips","bar","cereal","frozen"];

  function scoreCandidate(queryTokens, food){
    var desc = String(food.description||"");
    var descTokens = tokenize(desc);
    if(!descTokens.length) return -1;
    var hits = 0;
    queryTokens.forEach(function(qt){
      var found = descTokens.some(function(dt){
        return dt === qt || dt.indexOf(qt) === 0 || qt.indexOf(dt) === 0;
      });
      if(found) hits++;
    });
    var coverage = queryTokens.length ? hits/queryTokens.length : 0;
    // prefer concise generic entries over long specialty descriptions
    var brevity = 1/(1 + Math.max(0, descTokens.length - queryTokens.length));
    var score = coverage*10 + brevity;
    // penalize processed variants the query didn't ask for
    descTokens.forEach(function(dt){
      if(PROCESSED_WORDS.indexOf(dt) >= 0 && queryTokens.indexOf(dt) < 0) score -= 2;
    });
    // raw/cooked mismatch is a common wrong-pick
    var qHasCooked = queryTokens.indexOf("cooked") >= 0 || queryTokens.indexOf("baked") >= 0;
    var dHasRaw = descTokens.indexOf("raw") >= 0;
    var dHasCooked = descTokens.indexOf("cooked") >= 0 || descTokens.indexOf("baked") >= 0 || descTokens.indexOf("roasted") >= 0;
    if(qHasCooked && dHasCooked) score += 1.5;
    if(qHasCooked && dHasRaw) score -= 1.5;
    if(!qHasCooked && dHasRaw) score += 0.5;
    return score;
  }

  function extractMacros(food){
    var nutrients = food.foodNutrients || [];
    function findNutrient(names){
      var n = nutrients.find(function(x){ return names.indexOf(x.nutrientName) >= 0; });
      return n ? n.value : 0;
    }
    return {
      description: food.description,
      per100: {
        p: findNutrient(["Protein"]),
        c: findNutrient(["Carbohydrate, by difference"]),
        f: findNutrient(["Total lipid (fat)"])
      }
    };
  }

  function searchUsda(query){
    var params = new URLSearchParams({
      query: query,
      api_key: getUsdaKey(),
      pageSize: "10",
      dataType: "Foundation,SR Legacy"
    });
    var url = "https://api.nal.usda.gov/fdc/v1/foods/search?" + params.toString();
    return fetch(url).then(function(res){
      if(res.status === 429){
        var err = new Error("rate-limited");
        err.rateLimited = true;
        throw err;
      }
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    });
  }

  function simplifyQuery(query){
    // drop qualifiers after a comma ("Chicken breast, cooked" -> "Chicken breast"),
    // then drop trailing words one at a time
    var q = String(query).trim();
    if(q.indexOf(",") >= 0) return q.split(",")[0].trim();
    var words = q.split(/\s+/);
    if(words.length > 1){ words.pop(); return words.join(" "); }
    return null;
  }

  function lookupFood(query){
    var queryTokens = tokenize(query);
    function attempt(q, triesLeft){
      return searchUsda(q).then(function(data){
        var foods = (data && data.foods) || [];
        if(foods.length){
          var best = null, bestScore = -Infinity;
          foods.forEach(function(f){
            var s = scoreCandidate(queryTokens, f);
            if(s > bestScore){ bestScore = s; best = f; }
          });
          // require at least half the query words to appear in the match
          if(best && bestScore >= 5) return extractMacros(best);
        }
        var simpler = simplifyQuery(q);
        if(simpler && triesLeft > 0) return attempt(simpler, triesLeft-1);
        // fall back to best available candidate even if weak, rather than nothing
        if(foods.length) return extractMacros(foods[0]);
        return null;
      });
    }
    return attempt(String(query).trim(), 2);
  }

  function migrateMeals(meals){
    return meals.map(function(m){
      if(m.items.length && typeof m.items[0] === "object"){
        return m;
      }
      var oldP = m.p||0, oldC = m.c||0, oldF = m.f||0;
      var items = m.items.map(function(text, idx){
        var match = /^~?(\d+(?:\.\d+)?)\s*g\b\s*(.*)$/i.exec(String(text).trim());
        if(match){
          return ing(match[2] || text, parseFloat(match[1]), "g");
        }
        return ingManual(text, idx===0 ? oldP : 0, idx===0 ? oldC : 0, idx===0 ? oldF : 0);
      });
      var m2 = { id:m.id, name:m.name, sub:m.sub, items:items };
      return m2;
    });
  }

  function loadState(){
    var s = null;
    var raw = localStorage.getItem(STORE_KEY);
    if(raw){
      try{ s = JSON.parse(raw); }catch(e){ s = null; }
    }
    if(!s) s = {};
    if(!s.daily) s.daily = {};
    if(!s.weights) s.weights = SEED_WEIGHTS.map(function(w){ return {date:w[0], weight:w[1]}; });
    if(!s.meals) s.meals = clone(DEFAULT_MEALS);
    s.meals = migrateMeals(s.meals);
    if(!s.training) s.training = clone(DEFAULT_TRAINING);
    if(!s.notes) s.notes = clone(DEFAULT_NOTES);
    if(!s.exerciseLog) s.exerciseLog = {};
    return s;

  function escAttr(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

    var parts = dateStr.split("-");

    recalcAndPaint(mi, ii);
    lookupFood(item.food).then(function(result){
      if(result){
        item.per100 = result.per100;

      } else {
        item.status = "unmatched";

    }).catch(function(err){
      item.status = err && err.rateLimited ? "ratelimited" : "error";

      saveState();

  function processPendingLookups(){
    if(lookupQueueRunning) return;
    var queue = [];
    state.meals.forEach(function(m, mi){
      m.items.forEach(function(item, ii){
        if(item.mode === "auto" && item.status === "pending" && item.food && item.food.trim()){
          queue.push({mi:mi, ii:ii});
        }
      });
    });
    if(!queue.length) return;
    lookupQueueRunning = true;
    var idx = 0;
    function next(){
      if(idx >= queue.length){ lookupQueueRunning = false; return; }
      var ref = queue[idx++];
      var item = state.meals[ref.mi] && state.meals[ref.mi].items[ref.ii];
      if(!item || item.mode !== "auto"){ next(); return; }
      lookupFood(item.food).then(function(result){
        if(result){
          item.per100 = result.per100;
          item.matchDesc = result.description;
          item.status = "ok";
        } else {
          item.status = "unmatched";
        }
      }).catch(function(err){
        item.status = err && err.rateLimited ? "ratelimited" : "error";
      }).then(function(){
        saveState();
        recalcAndPaint(ref.mi, ref.ii);
        setTimeout(next, 350);
      });
    }
    next();
  }

  var openDays = {};

  function parseSetCount(scheme){
    var m = /^(\d+)/.exec(scheme||"");
    var n = m ? parseInt(m[1],10) : 3;
    return clampInt(n,1,8);
  }

  function blankSets(n){
    var a = [];
    for(var i=0;i<n;i++) a.push({w:"", r:""});
    return a;
  }

  function getExerciseEntries(name){
    if(!state.exerciseLog[name]) state.exerciseLog[name] = [];
    return state.exerciseLog[name];
  }

  function materializeTodayEntry(dayIdx, exIdx){
    var name = state.training[dayIdx].ex[exIdx][0];
    var scheme = state.training[dayIdx].ex[exIdx][1];
    var entries = getExerciseEntries(name);
    var ds = todayStr();
    var entry = entries.find(function(e){ return e.date===ds; });
    if(!entry){
      entry = { date: ds, sets: blankSets(parseSetCount(scheme)) };
      entries.push(entry);
      entries.sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
    }
    return entry;
  }

  function formatSetsSummary(sets){
    var parts = sets.filter(function(s){ return s.w!==""&&s.w!=null; })
      .map(function(s){ return s.w+"×"+(s.r!==""&&s.r!=null ? s.r : "-"); });
    return parts.join(", ");
  }

  function buildChartSVG(sorted){
    var W = 320, H = 150, padL = 34, padR = 10, padT = 14, padB = 22;
    var weights = sorted.map(function(w){ return w.weight; });
    var minW = Math.min.apply(null, weights);
    var maxW = Math.max.apply(null, weights);
    if(minW === maxW){ minW -= 2; maxW += 2; }
    var rangePad = (maxW-minW)*0.15;
    minW -= rangePad; maxW += rangePad;

    var innerW = W - padL - padR;
    var innerH = H - padT - padB;
    var n = sorted.length;

    function x(i){ return n===1 ? padL+innerW/2 : padL + (innerW * i/(n-1)); }
    function y(w){ return padT + innerH * (1 - (w-minW)/(maxW-minW)); }

    var pts = sorted.map(function(w,i){ return x(i)+","+y(w.weight); });
    var linePts = pts.join(" ");
    var areaPts = "M"+x(0)+","+(padT+innerH)+" L"+pts.join(" L")+" L"+x(n-1)+","+(padT+innerH)+" Z";

    var gridLines = "";
    for(var g=0; g<=2; g++){
      var gy = padT + innerH*g/2;
      var gv = maxW - (maxW-minW)*g/2;
      gridLines += '<line x1="'+padL+'" x2="'+(W-padR)+'" y1="'+gy+'" y2="'+gy+'" stroke="#222536" stroke-width="1"/>';
      gridLines += '<text x="'+(padL-6)+'" y="'+(gy+3)+'" font-size="8" fill="#5B6070" text-anchor="end">'+round1(gv)+'</text>';
    }

    var dots = sorted.map(function(w,i){
      return '<circle cx="'+x(i)+'" cy="'+y(w.weight)+'" r="'+(i===n-1?3.2:2.2)+'" fill="'+(i===n-1?'#00C896':'#00C896')+'" stroke="#0C0E14" stroke-width="1"/>';
    }).join("");

    var labelFirst = fmtDate(sorted[0].date);
    var labelLast = fmtDate(sorted[n-1].date);

    var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    svg += '<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="#00C896" stop-opacity="0.35"/>'+
      '<stop offset="100%" stop-color="#00C896" stop-opacity="0"/></linearGradient></defs>';
    svg += gridLines;
    svg += '<path d="'+areaPts+'" fill="url(#areaGrad)"/>';
    svg += '<polyline points="'+linePts+'" fill="none" stroke="#00C896" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
    svg += dots;
    svg += '<text x="'+padL+'" y="'+(H-4)+'" font-size="8" fill="#5B6070">'+labelFirst+'</text>';
    svg += '<text x="'+(W-padR)+'" y="'+(H-4)+'" font-size="8" fill="#5B6070" text-anchor="end">'+labelLast+'</text>';
    svg += '</svg>';
    return svg;
  }

  function renderLog(){
    var sorted = state.weights.slice().sort(function(a,b){ return a.date < b.date ? -1 : (a.date>b.date?1:0); });
    var ds = todayStr();

    var html = '';
    html += '<div class="page-title">Log</div>';
    html += '<div class="page-sub">Bodyweight history</div>';

    if(sorted.length === 0){
      html += '<div class="card"><div class="empty-hint">No entries yet. Save a weigh-in from the Today tab.</div></div>';
      document.getElementById("content").innerHTML = html;
      return;
    }

    var latest = sorted[sorted.length-1];
    var last7 = sorted.slice(Math.max(0, sorted.length-7));
    var avg7 = last7.reduce(function(s,w){ return s+w.weight; },0) / last7.length;

    html += '<div class="stat-row">';
    html += '<div class="stat-card"><div class="v">'+round1(latest.weight)+' <small>lb</small></div><div class="l">Latest</div></div>';
    html += '<div class="stat-card"><div class="v">'+round1(avg7)+' <small>lb</small></div><div class="l">7-Entry Avg</div></div>';
    html += '</div>';

    html += '<div class="card chart-card"><div class="chart-wrap">'+buildChartSVG(sorted)+'</div></div>';

    html += '<div class="card">';
    html += '<table class="log-table"><thead><tr><th>Date</th><th>Weight</th><th>Change</th></tr></thead><tbody>';
    var rev = sorted.slice().reverse();
    rev.forEach(function(w, i){
      var idxInSorted = sorted.length-1-i;
      var delta = idxInSorted>0 ? w.weight - sorted[idxInSorted-1].weight : null;
      var deltaHtml = "—";
      if(delta !== null){
        var cls = delta>0 ? "up" : (delta<0 ? "down" : "");
        var sign = delta>0 ? "+" : "";
        deltaHtml = '<span class="delta '+cls+'">'+sign+round1(delta)+'</span>';
      }
      var isToday = w.date === ds;
      html += '<tr class="'+(isToday?"today-row":"")+'">'+
        '<td>'+fmtDate(w.date)+(isToday?' (Today)':'')+'</td>'+
        '<td class="wt">'+round1(w.weight)+'</td>'+
        '<td class="delta">'+deltaHtml+'</td>'+
        '</tr>';
    });
    html += '</tbody></table></div>';

    document.getElementById("content").innerHTML = html;
  }

  /* ===================== TAB CONTROL ===================== */

  var TABS = { today: renderToday, diet: renderDiet, training: renderTraining, log: renderLog };
  var TAB_ORDER = ["today","diet","training","log"];
  var LAST_TAB_KEY = "fittrack.lastTab";

  function switchTab(name){
    if(!TABS[name]) name = "today";
    localStorage.setItem(LAST_TAB_KEY, name);
    document.querySelectorAll(".tabbtn").forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-tab")===name);
    });
    window.scrollTo(0,0);
    TABS[name]();
  }

  document.querySelectorAll(".tabbtn").forEach(function(btn){
    btn.addEventListener("click", function(){
      switchTab(btn.getAttribute("data-tab"));
    });
  });

  var startTab = localStorage.getItem(LAST_TAB_KEY);
  if(TAB_ORDER.indexOf(startTab) === -1) startTab = "today";
  switchTab(startTab);

})();
</script>
</body>
</html>
